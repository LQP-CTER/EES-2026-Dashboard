name: Keepalive Streamlit

on:
  schedule:
    # Chạy tự động vào lúc 00:00 mỗi 5 ngày (để tránh app bị tắt sau 7 ngày không ai dùng)
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create or update dummy file
        run: |
          echo "Last keepalive run: $(date)" > .keepalive
          
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          # Chỉ commit nếu có sự thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: keepalive commit to prevent Streamlit sleep" && git push)
